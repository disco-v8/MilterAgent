# =============================================================================
#Log File & Level
#  info: 通常ログ
#  trace: トレースログ（詳細なデバッグ情報）
#  debug: デバッグログ
# =============================================================================
Log_file	/var/log/milteragent.log
Log_level	info

# =============================================================================
#Listen 8898                # OK（ポートのみ指定時はIPv4/IPv6デュアルスタック）
#Listen 192.168.0.10:4000   # OK（明示アドレスとポート）
# =============================================================================
Listen	8898

# =============================================================================
#Client_timeout [秒]
# =============================================================================
Client_timeout	30

# =============================================================================
#RemoteIP_Target 0          # 外部からのメールのみ対象(デフォルト)
#RemoteIP_Target 1          # 内部からのメールのみ対象
#RemoteIP_Target 2          # 全てのメールを対象
# =============================================================================
RemoteIP_Target  0

# =============================================================================
# Subject Prefix Settings
#  Add_Subject_Prefix 0     # Subjectプレフィックスを付けない(デフォルト)
#  Add_Subject_Prefix 1     # WARNの場合だけ WARN_Subject_Prefix を使う
#  Add_Subject_Prefix 2     # REJECTの場合だけ REJECT_Subject_Prefix を使う
#  Add_Subject_Prefix 3     # WARN/REJECT の両方で個別プレフィックスを使う
#  WARN_Subject_Prefix      # 未指定時は "[WARN] " を利用(スペース自動追加)
#  REJECT_Subject_Prefix    # 未指定時は "[REJECT] " を利用(スペース自動追加)
#  この段階では設定追加のみで、Subject書き換え処理自体は次のステップで実装する
# =============================================================================
Add_Subject_Prefix  0
WARN_Subject_Prefix [WARN]
REJECT_Subject_Prefix [REJECT]

# =============================================================================
#Include Directory
# =============================================================================
include /etc/MilterAgent.d/
